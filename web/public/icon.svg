  <path class="om-stroke" pathLength="1" d="M134 154V72H164C184.987 72 202 89.0132 202 110C202 130.987 184.987 148 164 148H152" stroke="#111111" stroke-width="18" stroke-linecap="square"/>
  <path class="om-stroke" pathLength="1" d="M58 188H198" stroke="#111111" stroke-width="16" stroke-linecap="square"/>
  <path class="signal" d="M38 38H80" stroke="#111111" stroke-width="10" stroke-linecap="square"/>
  <path class="signal" d="M176 218H218" stroke="#111111" stroke-width="10" stroke-linecap="square"/>
</svg>
