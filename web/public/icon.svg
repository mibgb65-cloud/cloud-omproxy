<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .om-stroke {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: draw 1.1s ease-out both;
      }

      .om-stroke:nth-of-type(2) {
        animation-delay: .12s;
      }

      .om-stroke:nth-of-type(3) {
        animation-delay: .24s;
      }

      .signal {
        animation: blink 2.4s steps(1, end) infinite;
      }

      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes blink {
        0%, 72%, 100% {
          opacity: 1;
        }

        74%, 82% {
          opacity: .25;
        }
      }
    }
  </style>
  <rect x="16" y="16" width="224" height="224" fill="#ffffff" stroke="#111111" stroke-width="16"/>
